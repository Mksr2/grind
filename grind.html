<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRIND">

<title>GRIND</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjMTExMTE0Ii8+PHRleHQgeD0iOTAiIHk9IjEwNSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI5MDAiIGZvbnQtc2l6ZT0iNTAiIGZpbGw9IiNmZjRkNGQiPkdSSU5EPC90ZXh0Pjwvc3ZnPg==">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: #111114; overflow-x: hidden; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
button { -webkit-appearance: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const EXERCISE_DB = {
  Push: [
    { name: "Floor Dumbbell Press", sets: 4, reps: "10-12", muscle: "Chest" },
    { name: "Dumbbell Shoulder Press", sets: 4, reps: "10-12", muscle: "Shoulders" },
    { name: "Push-Ups", sets: 3, reps: "15-20", muscle: "Chest" },
    { name: "Dumbbell Lateral Raises", sets: 3, reps: "12-15", muscle: "Shoulders" },
    { name: "Diamond Push-Ups", sets: 3, reps: "12-15", muscle: "Triceps" },
    { name: "Overhead Tricep Extension", sets: 3, reps: "12-15", muscle: "Triceps" },
    { name: "Band Chest Flyes", sets: 3, reps: "15", muscle: "Chest" },
    { name: "Dumbbell Front Raises", sets: 3, reps: "12", muscle: "Shoulders" },
  ],
  Pull: [
    { name: "Dumbbell Bent-Over Rows", sets: 4, reps: "10-12", muscle: "Back" },
    { name: "Band Lat Pulldowns", sets: 4, reps: "12-15", muscle: "Back" },
    { name: "Dumbbell Bicep Curls", sets: 3, reps: "12", muscle: "Biceps" },
    { name: "Hammer Curls", sets: 3, reps: "12", muscle: "Biceps" },
    { name: "Band Face Pulls", sets: 3, reps: "15-20", muscle: "Rear Delts" },
    { name: "Dumbbell Reverse Flyes", sets: 3, reps: "12-15", muscle: "Rear Delts" },
    { name: "Dumbbell Shrugs", sets: 3, reps: "15", muscle: "Traps" },
    { name: "Band Pull-Aparts", sets: 3, reps: "20", muscle: "Upper Back" },
  ],
  Legs: [
    { name: "Goblet Squats", sets: 4, reps: "12-15", muscle: "Quads" },
    { name: "Dumbbell Romanian Deadlifts", sets: 4, reps: "10-12", muscle: "Hamstrings" },
    { name: "Bulgarian Split Squats", sets: 3, reps: "10/leg", muscle: "Quads" },
    { name: "Dumbbell Lunges", sets: 3, reps: "12/leg", muscle: "Quads" },
    { name: "Dumbbell Glute Bridges", sets: 3, reps: "15", muscle: "Glutes" },
    { name: "Calf Raises (Weighted)", sets: 4, reps: "20", muscle: "Calves" },
    { name: "Sumo Dumbbell Squats", sets: 3, reps: "12-15", muscle: "Inner Thigh" },
    { name: "Band Leg Curls", sets: 3, reps: "15", muscle: "Hamstrings" },
  ],
  Cardio: [
    { name: "Burpees", sets: 3, reps: "12", muscle: "Full Body" },
    { name: "Jump Squats", sets: 3, reps: "15", muscle: "Legs" },
    { name: "Mountain Climbers", sets: 3, reps: "30s", muscle: "Core" },
    { name: "High Knees", sets: 3, reps: "30s", muscle: "Legs" },
    { name: "Shadow Boxing", sets: 3, reps: "60s", muscle: "Full Body" },
    { name: "Jumping Jacks", sets: 3, reps: "30", muscle: "Full Body" },
    { name: "Plank to Push-Up", sets: 3, reps: "10", muscle: "Core" },
    { name: "Skater Jumps", sets: 3, reps: "20", muscle: "Legs" },
  ],
};

const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const FULL_DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
const WORKOUT_TYPES = ["Push", "Pull", "Legs", "Cardio", "Rest"];

const TYPE_COLORS = {
  Push: { bg: "#ff4d4d", dim: "rgba(255,77,77,0.12)", text: "#ff6b6b" },
  Pull: { bg: "#4dabff", dim: "rgba(77,171,255,0.12)", text: "#6db8ff" },
  Legs: { bg: "#ffc44d", dim: "rgba(255,196,77,0.12)", text: "#ffd06b" },
  Cardio: { bg: "#4dff91", dim: "rgba(77,255,145,0.12)", text: "#6bffaa" },
  Rest: { bg: "#888", dim: "rgba(136,136,136,0.08)", text: "#aaa" },
};

const TYPE_ICONS = {
  Push: "\u2B06",
  Pull: "\u2B07",
  Legs: "\uD83E\uDDB5",
  Cardio: "\u2665",
  Rest: "\uD83D\uDE34",
};

const STORAGE_KEY = "grind_app_data";

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {}
}

function RestTimer({ onClose }) {
  const [duration, setDuration] = useState(90);
  const [timeLeft, setTimeLeft] = useState(null);
  const [isRunning, setIsRunning] = useState(false);
  const intervalRef = useRef(null);
  const audioCtxRef = useRef(null);

  const playBeep = useCallback(() => {
    try {
      if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
      setTimeout(() => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2);
        g2.connect(ctx.destination);
        o2.frequency.value = 1100;
        g2.gain.value = 0.3;
        o2.start();
        o2.stop(ctx.currentTime + 0.25);
      }, 200);
    } catch (e) {}
  }, []);

  useEffect(() => {
    if (isRunning && timeLeft > 0) {
      intervalRef.current = setInterval(() => {
        setTimeLeft((t) => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setIsRunning(false);
            playBeep();
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [isRunning, timeLeft, playBeep]);

  const startTimer = () => { setTimeLeft(duration); setIsRunning(true); };
  const resetTimer = () => { clearInterval(intervalRef.current); setIsRunning(false); setTimeLeft(null); };

  const progress = timeLeft !== null ? ((duration - timeLeft) / duration) * 100 : 0;
  const mins = timeLeft !== null ? Math.floor(timeLeft / 60) : Math.floor(duration / 60);
  const secs = timeLeft !== null ? timeLeft % 60 : duration % 60;

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)",
      display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000,
      backdropFilter: "blur(8px)",
    }}>
      <div style={{
        background: "#1a1a1e", borderRadius: 24, padding: "40px 36px", width: 320,
        textAlign: "center", border: "1px solid #2a2a2e",
        boxShadow: "0 24px 80px rgba(0,0,0,0.6)",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32 }}>
          <span style={{ color: "#fff", fontSize: 18, fontFamily: "'Archivo Black', sans-serif", letterSpacing: 1 }}>REST TIMER</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#666", fontSize: 22, cursor: "pointer" }}>{"\u2715"}</button>
        </div>
        <div style={{ position: "relative", width: 180, height: 180, margin: "0 auto 28px" }}>
          <svg viewBox="0 0 180 180" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="90" cy="90" r="80" fill="none" stroke="#2a2a2e" strokeWidth="6" />
            <circle cx="90" cy="90" r="80" fill="none"
              stroke={timeLeft === 0 ? "#4dff91" : "#ff4d4d"}
              strokeWidth="6" strokeLinecap="round"
              strokeDasharray={`${2 * Math.PI * 80}`}
              strokeDashoffset={`${2 * Math.PI * 80 * (1 - progress / 100)}`}
              style={{ transition: "stroke-dashoffset 0.3s ease, stroke 0.3s ease" }}
            />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 44, color: "#fff", fontWeight: 700, letterSpacing: 2 }}>
              {String(mins).padStart(2, "0")}:{String(secs).padStart(2, "0")}
            </span>
            {timeLeft === 0 && <span style={{ color: "#4dff91", fontSize: 13, fontWeight: 600, marginTop: 4, letterSpacing: 1 }}>DONE!</span>}
          </div>
        </div>
        {!isRunning && timeLeft === null && (
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
              {[30, 60, 90, 120, 180].map((s) => (
                <button key={s} onClick={() => setDuration(s)} style={{
                  padding: "8px 14px", borderRadius: 10, border: "none",
                  background: duration === s ? "#ff4d4d" : "#2a2a2e",
                  color: duration === s ? "#fff" : "#aaa",
                  fontSize: 13, fontWeight: 600, cursor: "pointer",
                  fontFamily: "'JetBrains Mono', monospace",
                }}>{s}s</button>
              ))}
            </div>
          </div>
        )}
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          {!isRunning && timeLeft === null && (
            <button onClick={startTimer} style={{
              padding: "14px 40px", borderRadius: 14, border: "none",
              background: "#ff4d4d", color: "#fff", fontSize: 15,
              fontWeight: 700, cursor: "pointer", letterSpacing: 1,
              fontFamily: "'Archivo Black', sans-serif",
            }}>START</button>
          )}
          {isRunning && (
            <button onClick={() => { clearInterval(intervalRef.current); setIsRunning(false); }} style={{
              padding: "14px 32px", borderRadius: 14, border: "none",
              background: "#ffc44d", color: "#111", fontSize: 15,
              fontWeight: 700, cursor: "pointer", letterSpacing: 1,
            }}>PAUSE</button>
          )}
          {!isRunning && timeLeft !== null && timeLeft > 0 && (
            <button onClick={() => setIsRunning(true)} style={{
              padding: "14px 32px", borderRadius: 14, border: "none",
              background: "#4dff91", color: "#111", fontSize: 15,
              fontWeight: 700, cursor: "pointer", letterSpacing: 1,
            }}>RESUME</button>
          )}
          {timeLeft !== null && (
            <button onClick={resetTimer} style={{
              padding: "14px 32px", borderRadius: 14, border: "none",
              background: "#2a2a2e", color: "#aaa", fontSize: 15,
              fontWeight: 700, cursor: "pointer", letterSpacing: 1,
            }}>RESET</button>
          )}
        </div>
      </div>
    </div>
  );
}

function WorkoutApp() {
  const saved = loadData();
  const [schedule, setSchedule] = useState(saved?.schedule || {
    Mon: "Push", Tue: "Pull", Wed: "Legs", Thu: "Cardio", Fri: "Rest", Sat: "Rest", Sun: "Rest",
  });
  const [selectedDay, setSelectedDay] = useState(null);
  const [checkedExercises, setCheckedExercises] = useState(saved?.checked || {});
  const [showTimer, setShowTimer] = useState(false);
  const [editingDay, setEditingDay] = useState(null);
  const [setsTracking, setSetsTracking] = useState(saved?.sets || {});

  useEffect(() => {
    const today = new Date().getDay();
    const dayIndex = today === 0 ? 6 : today - 1;
    setSelectedDay(DAYS[dayIndex]);
  }, []);

  useEffect(() => {
    saveData({ schedule, checked: checkedExercises, sets: setsTracking });
  }, [schedule, checkedExercises, setsTracking]);

  const todayIndex = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();

  const toggleExercise = (day, exIdx) => {
    const key = `${day}-${exIdx}`;
    setCheckedExercises((p) => ({ ...p, [key]: !p[key] }));
  };

  const toggleSet = (day, exIdx, setIdx) => {
    const key = `${day}-${exIdx}-${setIdx}`;
    setSetsTracking((p) => ({ ...p, [key]: !p[key] }));
  };

  const getWorkoutForDay = (day) => {
    const type = schedule[day];
    if (!type || type === "Rest") return [];
    return EXERCISE_DB[type] || [];
  };

  const getDayProgress = (day) => {
    const exercises = getWorkoutForDay(day);
    if (exercises.length === 0) return 0;
    const done = exercises.filter((_, i) => checkedExercises[`${day}-${i}`]).length;
    return Math.round((done / exercises.length) * 100);
  };

  const currentType = selectedDay ? schedule[selectedDay] : null;
  const currentColor = currentType ? TYPE_COLORS[currentType] : TYPE_COLORS.Rest;
  const exercises = selectedDay ? getWorkoutForDay(selectedDay) : [];

  return (
    <div style={{
      minHeight: "100vh", background: "#111114", color: "#fff",
      fontFamily: "'Inter', -apple-system, sans-serif",
      paddingBottom: "env(safe-area-inset-bottom)",
    }}>
      {showTimer && <RestTimer onClose={() => setShowTimer(false)} />}

      {/* Header */}
      <div style={{ padding: "24px 20px 0", maxWidth: 520, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div>
            <h1 style={{
              fontFamily: "'Archivo Black', sans-serif", fontSize: 26,
              margin: 0, letterSpacing: 2, lineHeight: 1,
              background: "linear-gradient(135deg, #ff4d4d, #ffc44d)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            }}>GRIND</h1>
            <p style={{ color: "#555", fontSize: 11, margin: "4px 0 0", letterSpacing: 3, fontWeight: 600 }}>HOME WORKOUT TRACKER</p>
          </div>
          <button onClick={() => setShowTimer(true)} style={{
            background: "#1e1e22", border: "1px solid #2a2a2e", borderRadius: 14,
            padding: "10px 16px", color: "#ff4d4d", fontSize: 13, fontWeight: 700,
            cursor: "pointer", display: "flex", alignItems: "center", gap: 6, letterSpacing: 0.5,
          }}>
            <span style={{ fontSize: 16 }}>{"\u23F1"}</span> REST
          </button>
        </div>
      </div>

      {/* Weekly Calendar */}
      <div style={{ padding: "20px 20px 0", maxWidth: 520, margin: "0 auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
          {DAYS.map((day, i) => {
            const type = schedule[day];
            const color = TYPE_COLORS[type] || TYPE_COLORS.Rest;
            const isSelected = selectedDay === day;
            const isToday = i === todayIndex;
            const progress = getDayProgress(day);
            return (
              <button key={day}
                onClick={() => { setSelectedDay(day); }}
                onDoubleClick={() => setEditingDay(day)}
                style={{
                  background: isSelected ? color.dim : "#1a1a1e",
                  border: isSelected ? `2px solid ${color.bg}` : isToday ? "2px solid #333" : "2px solid transparent",
                  borderRadius: 14, padding: "10px 4px 8px", cursor: "pointer",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                  transition: "all 0.2s ease", position: "relative", overflow: "hidden",
                }}>
                <span style={{ fontSize: 10, color: isToday ? "#fff" : "#555", fontWeight: 700, letterSpacing: 1 }}>{day.toUpperCase()}</span>
                <span style={{ fontSize: 20 }}>{TYPE_ICONS[type]}</span>
                <span style={{ fontSize: 9, color: color.text, fontWeight: 700, letterSpacing: 0.5, opacity: 0.9 }}>{type}</span>
                {type !== "Rest" && (
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 3, background: "#2a2a2e" }}>
                    <div style={{ height: "100%", width: `${progress}%`, background: color.bg, transition: "width 0.3s ease", borderRadius: 2 }} />
                  </div>
                )}
              </button>
            );
          })}
        </div>
        <p style={{ color: "#444", fontSize: 10, margin: "8px 0 0", textAlign: "center", letterSpacing: 0.5 }}>
          Long-press a day to change its workout type
        </p>
      </div>

      {/* Day Type Selector */}
      {editingDay && (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999,
          backdropFilter: "blur(6px)",
        }}>
          <div style={{
            background: "#1a1a1e", borderRadius: 20, padding: 28, width: 300, border: "1px solid #2a2a2e",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <span style={{ color: "#fff", fontSize: 16, fontFamily: "'Archivo Black', sans-serif", letterSpacing: 1 }}>{FULL_DAYS[DAYS.indexOf(editingDay)]}</span>
              <button onClick={() => setEditingDay(null)} style={{ background: "none", border: "none", color: "#666", fontSize: 20, cursor: "pointer" }}>{"\u2715"}</button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {WORKOUT_TYPES.map((type) => {
                const color = TYPE_COLORS[type];
                const isActive = schedule[editingDay] === type;
                return (
                  <button key={type} onClick={() => {
                    setSchedule((p) => ({ ...p, [editingDay]: type }));
                    setEditingDay(null);
                  }} style={{
                    display: "flex", alignItems: "center", gap: 12,
                    padding: "12px 16px", borderRadius: 12, border: "none",
                    background: isActive ? color.dim : "#222226",
                    cursor: "pointer", transition: "all 0.15s ease",
                    outline: isActive ? `2px solid ${color.bg}` : "none",
                  }}>
                    <span style={{ fontSize: 22 }}>{TYPE_ICONS[type]}</span>
                    <span style={{ color: isActive ? color.text : "#888", fontWeight: 700, fontSize: 14, letterSpacing: 0.5 }}>{type}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Day Detail */}
      {selectedDay && (
        <div style={{ padding: "20px 20px 100px", maxWidth: 520, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div>
              <h2 style={{
                fontFamily: "'Archivo Black', sans-serif", fontSize: 20, margin: 0,
                color: currentColor.text, letterSpacing: 1,
              }}>
                {TYPE_ICONS[currentType]} {currentType ? currentType.toUpperCase() : ""} DAY
              </h2>
              <p style={{ color: "#555", fontSize: 12, margin: "2px 0 0" }}>{FULL_DAYS[DAYS.indexOf(selectedDay)]}</p>
            </div>
            {currentType !== "Rest" && exercises.length > 0 && (
              <div style={{ background: currentColor.dim, borderRadius: 12, padding: "8px 14px", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 20, fontWeight: 700, color: currentColor.text }}>{getDayProgress(selectedDay)}%</span>
              </div>
            )}
          </div>

          {currentType === "Rest" ? (
            <div style={{ background: "#1a1a1e", borderRadius: 20, padding: "48px 24px", textAlign: "center", border: "1px solid #222" }}>
              <span style={{ fontSize: 48 }}>{"\uD83D\uDE34"}</span>
              <p style={{ color: "#666", fontSize: 15, marginTop: 12, fontWeight: 500 }}>Rest day — recover and come back stronger</p>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {exercises.map((ex, idx) => {
                const isDone = checkedExercises[`${selectedDay}-${idx}`];
                return (
                  <div key={idx} style={{
                    background: isDone ? currentColor.dim : "#1a1a1e",
                    borderRadius: 16, padding: "14px 16px",
                    border: isDone ? `1px solid ${currentColor.bg}33` : "1px solid #222",
                    transition: "all 0.2s ease", opacity: isDone ? 0.7 : 1,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <button onClick={() => toggleExercise(selectedDay, idx)} style={{
                        width: 28, height: 28, borderRadius: 8, border: "none",
                        background: isDone ? currentColor.bg : "#2a2a2e",
                        cursor: "pointer", display: "flex", alignItems: "center",
                        justifyContent: "center", flexShrink: 0, transition: "all 0.15s ease",
                      }}>
                        {isDone && <span style={{ color: "#fff", fontSize: 14, fontWeight: 700 }}>{"\u2713"}</span>}
                      </button>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{
                            color: isDone ? "#666" : "#fff", fontSize: 14, fontWeight: 600,
                            textDecoration: isDone ? "line-through" : "none",
                          }}>{ex.name}</span>
                          <span style={{
                            color: currentColor.text, fontSize: 10, fontWeight: 700,
                            background: currentColor.dim, padding: "3px 8px",
                            borderRadius: 6, letterSpacing: 0.5, flexShrink: 0,
                          }}>{ex.muscle}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}>
                          <span style={{
                            fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#555", fontWeight: 500,
                          }}>{ex.sets}{"\u00D7"}{ex.reps}</span>
                          <div style={{ display: "flex", gap: 4, marginLeft: 4 }}>
                            {Array.from({ length: ex.sets }).map((_, setIdx) => {
                              const setDone = setsTracking[`${selectedDay}-${idx}-${setIdx}`];
                              return (
                                <button key={setIdx} onClick={() => toggleSet(selectedDay, idx, setIdx)} style={{
                                  width: 24, height: 24, borderRadius: 6, border: "none", fontSize: 10, fontWeight: 700,
                                  background: setDone ? currentColor.bg : "#2a2a2e",
                                  color: setDone ? "#fff" : "#555",
                                  cursor: "pointer", transition: "all 0.15s ease",
                                  fontFamily: "'JetBrains Mono', monospace",
                                }}>{setIdx + 1}</button>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Legend */}
          <div style={{ marginTop: 24, padding: 16, background: "#1a1a1e", borderRadius: 14, border: "1px solid #222" }}>
            <span style={{ color: "#444", fontSize: 10, fontWeight: 700, letterSpacing: 2, display: "block", marginBottom: 10 }}>LEGEND</span>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
              {Object.entries(TYPE_COLORS).map(([type, color]) => (
                <div key={type} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: color.bg }} />
                  <span style={{ color: "#666", fontSize: 11, fontWeight: 500 }}>{type}</span>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ display: "flex", gap: 3 }}>
                <div style={{ width: 18, height: 18, borderRadius: 4, background: "#2a2a2e", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 8, color: "#555", fontFamily: "'JetBrains Mono', monospace" }}>1</span>
                </div>
                <div style={{ width: 18, height: 18, borderRadius: 4, background: "#ff4d4d", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 8, color: "#fff", fontFamily: "'JetBrains Mono', monospace" }}>2</span>
                </div>
              </div>
              <span style={{ color: "#666", fontSize: 11 }}>Tap numbered buttons to track individual sets</span>
            </div>
          </div>

          {/* Reset Button */}
          <button onClick={() => {
            if (confirm("Reset all progress for this week?")) {
              setCheckedExercises({});
              setSetsTracking({});
            }
          }} style={{
            marginTop: 16, width: "100%", padding: "12px", borderRadius: 12,
            border: "1px solid #2a2a2e", background: "#1a1a1e",
            color: "#555", fontSize: 12, fontWeight: 600, cursor: "pointer",
            letterSpacing: 1,
          }}>RESET WEEK PROGRESS</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WorkoutApp />);
</script>
</body>
</html>
